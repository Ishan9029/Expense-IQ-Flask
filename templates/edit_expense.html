{% extends "base.html" %}
{% block title %}Edit Expense — {{ app_name }}{% endblock %}
{% block content %}
<section class="page-shell narrow-shell">
    <div class="page-head"><div><div class="hero-badge">Edit Expense</div><h1 class="dashboard-title">Update expense</h1><p class="dashboard-subtitle">Edit the transaction details below.</p></div></div>
    <section class="panel form-panel">
        <form method="POST" class="expense-form">
            <div class="form-grid">
                <div class="form-group"><label>Date</label><input type="date" name="expense_date" value="{{ expense['expense_date'] }}" required></div>
                <div class="form-group"><label>Amount</label><input type="number" name="amount" step="0.01" min="0.01" value="{{ expense['amount'] }}" required></div>
            </div>
            <div class="form-group"><label>Description</label><input type="text" name="description" value="{{ expense['description'] }}" required></div>
            <div class="form-grid">
                <div class="form-group"><label>Category</label><select name="category">{% for category in categories %}<option value="{{ category }}" {% if expense['category'] == category %}selected{% endif %}>{{ category }}</option>{% endfor %}</select></div>
                <div class="form-group"><label>Payment Mode</label><select name="payment_mode">{% for mode in payment_modes %}<option value="{{ mode }}" {% if expense['payment_mode'] == mode %}selected{% endif %}>{{ mode }}</option>{% endfor %}</select></div>
            </div>
            <div class="action-row space-top"><button type="submit" class="btn-submit">Save changes</button><a href="{{ url_for('expenses_list') }}" class="btn-ghost">Cancel</a></div>
        </form>
    </section>
</section>
{% endblock %}
